<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Presupuestos - MIAA</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Calculadora de Presupuestos</h1>
            <p>Sistema de Gestión de Trámites - MIAA SSCA</p>
        </div>

        <div class="content">
            <div class="sidebar">
                <h2>Paquetes de Trámites</h2>
                <div id="paquetes-lista"></div>
            </div>

            <div class="main-content">
                <div id="contenido-principal">
                    <div class="empty-state">
                        <div style="font-size: 4em; margin-bottom: 20px;">📋</div>
                        <h3>Selecciona un paquete de trámite</h3>
                        <p>Elige un paquete del menú lateral para ver sus conceptos y calcular el presupuesto</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
